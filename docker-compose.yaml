services:
  # ① 백엔드 서비스 (FastAPI)
  backend:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./fastapi:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      pgvector:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
  # ② n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    env_file:
      - ./.env
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n.jsangho.cloud
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.jsangho.cloud
    volumes:
      - ./data/n8n:/home/node/.n8n

  # ③ Neo4j (Graph DB)
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ④ Redis (Cache / Queue)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ⑤ pgvector (PostgreSQL + pgvector 확장)
  pgvector:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: vectordb
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vectordb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ⑥ pgAdmin (PostgreSQL 관리 UI)
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - pgvector

  # ⑦ Cloudflare Tunnel (api.jsangho.cloud → backend, n8n.jsangho.cloud → n8n)
  cloudflared:
    image: cloudflare/cloudflared:latest
    user: "0:0"
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ${HOME}/.cloudflared-docker:/etc/cloudflared:ro
    depends_on:
      - backend
      - n8n
    restart: unless-stopped

volumes:
  neo4j_data:
  redis_data:
  pgvector_data:
  pgadmin_data:
